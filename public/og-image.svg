<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0f0f1a"/>
  <rect width="1200" height="630" fill="url(#bgGrad)" opacity="0.3"/>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stopColor="#7857f6"/>
      <stop offset="100%" stopColor="#00ddaa"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="600" y2="0">
      <stop offset="0%" stopColor="#7857f6"/>
      <stop offset="100%" stopColor="#00ddaa"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="100" y2="100">
      <stop offset="0%" stopColor="#a855f7"/>
      <stop offset="100%" stopColor="#00ddaa"/>
    </linearGradient>
  </defs>

  <!-- Decorative orbs -->
  <circle cx="200" cy="550" r="250" fill="#7857f6" opacity="0.08"/>
  <circle cx="1000" cy="100" r="200" fill="#00ddaa" opacity="0.06"/>
  <circle cx="1100" cy="500" r="150" fill="#7857f6" opacity="0.05"/>

  <!-- Quiz icon / question mark circle -->
  <circle cx="200" cy="315" r="90" fill="url(#iconGrad)" opacity="0.15"/>
  <circle cx="200" cy="315" r="90" stroke="url(#iconGrad)" stroke-width="4"/>
  <text x="200" y="355" text-anchor="middle" font-size="80" font-weight="bold" fill="url(#iconGrad)" font-family="system-ui, sans-serif">?</text>

  <!-- CuriosiQuiz title -->
  <text x="340" y="300" font-size="64" font-weight="800" fill="#fff" font-family="system-ui, sans-serif" letter-spacing="-1">Curiosi</text>
  <text x="340" y="370" font-size="64" font-weight="800" fill="url(#textGrad)" font-family="system-ui, sans-serif" letter-spacing="-1">Quiz</text>

  <!-- Tagline -->
  <text x="340" y="420" font-size="20" fill="#888" font-family="system-ui, sans-serif">Poné a prueba tu conocimiento · 8 categorías · 22 logros</text>

  <!-- Category pills -->
  <g transform="translate(340, 450)">
    <rect x="0" y="0" width="80" height="26" rx="13" fill="#7857f6" opacity="0.2"/>
    <text x="40" y="18" text-anchor="middle" font-size="11" fill="#a855f7" font-family="system-ui, sans-serif">Cultura</text>

    <rect x="90" y="0" width="60" height="26" rx="13" fill="#ef4444" opacity="0.2"/>
    <text x="120" y="18" text-anchor="middle" font-size="11" fill="#ef4444" font-family="system-ui, sans-serif">Cine</text>

    <rect x="160" y="0" width="70" height="26" rx="13" fill="#f97316" opacity="0.2"/>
    <text x="195" y="18" text-anchor="middle" font-size="11" fill="#f97316" font-family="system-ui, sans-serif">Deportes</text>

    <rect x="240" y="0" width="60" height="26" rx="13" fill="#eab308" opacity="0.2"/>
    <text x="270" y="18" text-anchor="middle" font-size="11" fill="#eab308" font-family="system-ui, sans-serif">Historia</text>

    <rect x="310" y="0" width="90" height="26" rx="13" fill="#ec4899" opacity="0.2"/>
    <text x="355" y="18" text-anchor="middle" font-size="11" fill="#ec4899" font-family="system-ui, sans-serif">Videojuegos</text>

    <rect x="410" y="0" width="60" height="26" rx="13" fill="#06b6d4" opacity="0.2"/>
    <text x="440" y="18" text-anchor="middle" font-size="11" fill="#06b6d4" font-family="system-ui, sans-serif">Música</text>

    <rect x="480" y="0" width="75" height="26" rx="13" fill="#14b8a6" opacity="0.2"/>
    <text x="517" y="18" text-anchor="middle" font-size="11" fill="#14b8a6" font-family="system-ui, sans-serif">Geografía</text>

    <rect x="565" y="0" width="80" height="26" rx="13" fill="#f43f5e" opacity="0.2"/>
    <text x="605" y="18" text-anchor="middle" font-size="11" fill="#f43f5e" font-family="system-ui, sans-serif">Tecnología</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1200" height="30" fill="url(#bgGrad)" opacity="0.15"/>
  <text x="600" y="620" text-anchor="middle" font-size="12" fill="#555" font-family="system-ui, sans-serif">curiosiquiz.vercel.app</text>
</svg>
